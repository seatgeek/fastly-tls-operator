# Copy this file to fastly-secret.yaml and replace the placeholder with your Fastly API token.
# fastly-secret.yaml is gitignored so credentials are not committed.
#
#   cp config/operator/fastly-secret.example.yaml config/operator/fastly-secret.yaml
#   # Edit config/operator/fastly-secret.yaml and set the value of api-key.
#

apiVersion: v1
kind: Secret
metadata:
  name: fastly-secret
  namespace: kube-system
type: Opaque
data:
  # base64-encoded Fastly API token: echo -n "YOUR_FASTLY_API_TOKEN" | base64
  api-key: PLACEHOLDER_REPLACE_WITH_BASE64_ENCODED_FASTLY_API_TOKEN
